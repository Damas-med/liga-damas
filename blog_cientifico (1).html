<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Científico — DANAS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --verde:#1a3d2b;
  --ouro:#c9a84c;
  --ouro2:#e8c96b;
  --muted:#6b7280;
  --border:#e5e7eb;
  --tag-bg:#f0f4f0;
}
body{font-family:'Inter',sans-serif;background:#fff;color:#111;padding:0;}

/* LOADING */
.loading{
  text-align:center;padding:60px 24px;color:var(--muted);
}
.loading-spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--verde);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* SECTION HEADERS */
.section-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:18px;
}
.section-label{
  color:var(--ouro);font-size:11.5px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  margin-bottom:4px;
}
.section-title{font-family:'Playfair Display',serif;font-size:26px;color:#111;font-weight:700;}
.btn-ver-todos{
  padding:7px 16px;border:1.5px solid var(--border);
  border-radius:8px;background:#fff;
  font-size:12.5px;font-weight:600;cursor:pointer;
  font-family:inherit;color:#374151;
  transition:border-color .2s;text-decoration:none;
  white-space:nowrap;
}
.btn-ver-todos:hover{border-color:var(--verde);color:var(--verde);}

/* ARTIGOS GRID */
.artigos-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:20px;margin-bottom:48px;
}
.artigo-card{
  border-radius:12px;overflow:hidden;
  border:1px solid var(--border);background:#fff;
  transition:box-shadow .2s,transform .2s;
  cursor:pointer;text-decoration:none;
  display:flex;flex-direction:column;color:inherit;
}
.artigo-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.1);transform:translateY(-3px);}
.artigo-img{width:100%;height:148px;object-fit:cover;background:#e5e7eb;display:block;}
.artigo-img-ph{
  width:100%;height:148px;
  background:linear-gradient(135deg,#e5e7eb,#d1d5db);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
}
.artigo-body{padding:14px;}
.artigo-tag{
  display:inline-block;background:var(--tag-bg);color:#374151;
  font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;margin-bottom:8px;
}
.artigo-titulo{font-size:14px;font-weight:700;color:#111;line-height:1.45;margin-bottom:8px;}
.artigo-data{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);}

/* DESTAQUES */
.destaques-header{
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--ouro);
  padding-bottom:10px;margin-bottom:20px;
}
.destaques-label{
  font-size:13px;font-weight:700;color:#111;
  letter-spacing:0.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.destaques-linha{width:36px;height:3px;background:var(--ouro);border-radius:2px;flex-shrink:0;}
.destaques-grid{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:14px;margin-bottom:48px;
}
.destaque-card{
  border:1px solid var(--border);border-radius:10px;
  padding:18px 14px;background:#fff;text-align:center;
  transition:border-color .2s,box-shadow .2s;
  cursor:pointer;text-decoration:none;color:inherit;
  display:flex;flex-direction:column;align-items:center;
}
.destaque-card:hover{border-color:var(--verde);box-shadow:0 4px 12px rgba(26,61,43,0.1);}
.destaque-icon{font-size:28px;margin-bottom:10px;}
.destaque-titulo{font-size:12px;font-weight:600;color:#111;line-height:1.4;margin-bottom:10px;flex:1;}
.destaque-link{font-size:12px;font-weight:700;color:var(--verde);}

/* CTA */
.cta-banner{
  background:#f8f9f5;border-radius:12px;
  border:1px solid var(--border);padding:24px 32px;
  display:flex;align-items:center;justify-content:space-between;
  gap:20px;margin-bottom:16px;flex-wrap:wrap;
}
.cta-left{display:flex;align-items:center;gap:16px;}
.cta-icon{font-size:32px;}
.cta-text h3{font-size:16px;font-weight:700;color:#111;}
.cta-text p{font-size:13px;color:var(--muted);margin-top:3px;}
.btn-dark{
  background:#111;color:#fff;padding:12px 28px;
  border-radius:8px;font-size:14px;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;
  transition:background .2s;white-space:nowrap;
}
.btn-dark:hover{background:#333;}

/* ERRO */
.erro{
  text-align:center;padding:40px;color:var(--muted);
  grid-column:1/-1;
}
.erro-icon{font-size:36px;margin-bottom:10px;}
.erro h3{font-size:15px;font-weight:600;color:#dc2626;margin-bottom:6px;}
.erro p{font-size:13px;}

/* RESPONSIVE */
@media(max-width:900px){
  .artigos-grid{grid-template-columns:repeat(2,1fr);}
  .destaques-grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:560px){
  .artigos-grid{grid-template-columns:1fr;}
  .destaques-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- ARTIGOS -->
<div class="section-header">
  <div>
    <div class="section-label">🔬 BLOG CIENTÍFICO</div>
    <div class="section-title">Artigos e notícias</div>
  </div>
  <a href="#" class="btn-ver-todos">VER TODOS</a>
</div>
<div class="artigos-grid" id="artigos-grid">
  <div class="loading" style="grid-column:1/-1">
    <div class="loading-spinner"></div>
    Carregando artigos...
  </div>
</div>

<!-- DESTAQUES -->
<div class="destaques-header">
  <div class="destaques-label">
    <div class="destaques-linha"></div>
    Destaques Científicos
  </div>
  <a href="#" class="btn-ver-todos">VER TODOS</a>
</div>
<div class="destaques-grid" id="destaques-grid">
  <div class="loading" style="grid-column:1/-1">
    <div class="loading-spinner"></div>
    Carregando destaques...
  </div>
</div>

<!-- CTA -->
<div class="cta-banner">
  <div class="cta-left">
    <div class="cta-icon">💬</div>
    <div class="cta-text">
      <h3>Tem um artigo ou gostaria de contribuir com o blog?</h3>
      <p>Entre em contato com a Diretoria Científica.</p>
    </div>
  </div>
  <button class="btn-dark">FALE CONOSCO</button>
</div>

<script>
// ================================================================
//  👇 COLE AQUI O LINK DA SUA PLANILHA DO GOOGLE SHEETS
//  Arquivo → Compartilhar → Publicar na web → aba "Artigos" → CSV
// ================================================================
const GOOGLE_SHEETS_URL = "1lc7L6h4QH9ZXSJr36x7AMqBJ26E5VfGIE40mg-TORfM";
// ================================================================

function calSVG(){
  return `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
}

function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    // handle commas inside quoted fields
    const cols = [];
    let cur = '', inQ = false;
    for(let i=0; i<line.length; i++){
      const ch = line[i];
      if(ch==='"'){ inQ=!inQ; }
      else if(ch===',' && !inQ){ cols.push(cur); cur=''; }
      else { cur+=ch; }
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (cols[i]||'').trim());
    return obj;
  });
}

function normaliza(str){ return (str||'').toLowerCase().trim(); }

function renderArtigos(artigos){
  const grid = document.getElementById('artigos-grid');
  if(!artigos.length){
    grid.innerHTML='<div class="erro"><div class="erro-icon">📰</div><h3>Nenhum artigo encontrado</h3><p>Verifique se a planilha tem dados na aba Artigos.</p></div>';
    return;
  }
  grid.innerHTML = artigos.map(a => {
    const img = a['URL DA IMAGEM'] || a['img'] || '';
    const titulo = a['TÍTULO DO ARTIGO'] || a['titulo'] || '';
    const tag = a['TAG / CATEGORIA'] || a['tag'] || '';
    const data = a['DATA (ex: 20 de maio de 2026)'] || a['data'] || '';
    const link = a['LINK DO ARTIGO'] || a['link'] || '#';
    return `
      <a class="artigo-card" href="${link}" target="_blank">
        ${img
          ? `<img class="artigo-img" src="${img}" alt="${titulo}" onerror="this.outerHTML='<div class=\\'artigo-img-ph\\'>📰</div>'">`
          : `<div class="artigo-img-ph">📰</div>`}
        <div class="artigo-body">
          <div class="artigo-tag">${tag}</div>
          <div class="artigo-titulo">${titulo}</div>
          <div class="artigo-data">${calSVG()} ${data}</div>
        </div>
      </a>`;
  }).join('');
}

function renderDestaques(artigos){
  const grid = document.getElementById('destaques-grid');
  const destaques = artigos.filter(a => normaliza(a['DESTAQUE?  (sim/não)'] || a['destaque']) === 'sim');
  if(!destaques.length){
    grid.innerHTML='<div class="erro" style="grid-column:1/-1"><div class="erro-icon">🏆</div><h3>Nenhum destaque</h3><p>Marque "sim" na coluna Destaque? para adicionar aqui.</p></div>';
    return;
  }
  grid.innerHTML = destaques.map(a => {
    const icone = a['ÍCONE DO DESTAQUE'] || a['icone'] || '📌';
    const titulo = a['TÍTULO DO ARTIGO'] || a['titulo'] || '';
    const link = a['LINK DO ARTIGO'] || a['link'] || '#';
    return `
      <a class="destaque-card" href="${link}" target="_blank">
        <div class="destaque-icon">${icone}</div>
        <div class="destaque-titulo">${titulo}</div>
        <div class="destaque-link">Saiba mais →</div>
      </a>`;
  }).join('');
}

function mostrarErro(msg){
  const erroHTML = `
    <div class="erro" style="grid-column:1/-1">
      <div class="erro-icon">⚠️</div>
      <h3>Não foi possível carregar</h3>
      <p>${msg}</p>
    </div>`;
  document.getElementById('artigos-grid').innerHTML = erroHTML;
  document.getElementById('destaques-grid').innerHTML = erroHTML;
}

async function carregarPlanilha(){
  if(GOOGLE_SHEETS_URL === "COLE_SEU_LINK_AQUI"){
    mostrarErro('Configure o link da planilha no código HTML (linha com GOOGLE_SHEETS_URL).');
    return;
  }
  try {
    const res = await fetch(GOOGLE_SHEETS_URL);
    if(!res.ok) throw new Error('Erro ao acessar a planilha (HTTP '+res.status+')');
    const text = await res.text();
    const artigos = parseCSV(text).filter(a => (a['TÍTULO DO ARTIGO']||a['titulo']||'').trim());
    renderArtigos(artigos);
    renderDestaques(artigos);
  } catch(err){
    mostrarErro('Verifique se o link está correto e se a planilha está publicada publicamente.<br><small>'+err.message+'</small>');
  }
}

carregarPlanilha();
</script>
</body>
</html>
